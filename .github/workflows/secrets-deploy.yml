name: Secrets & Deployment

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    env:
      HF_ENDPOINT: ${{ secrets.HF_ENDPOINT }}
      HF_ACCESS_KEY_ID: ${{ secrets.HF_ACCESS_KEY_ID }}
      HF_SECRET_ACCESS_KEY: ${{ secrets.HF_SECRET_ACCESS_KEY }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Verify secrets loaded
        run: |
          if [ -z "$HF_ENDPOINT" ]; then
            echo "ERROR: HF_ENDPOINT secret not set"
            exit 1
          fi
          if [ -z "$HF_ACCESS_KEY_ID" ]; then
            echo "ERROR: HF_ACCESS_KEY_ID secret not set"
            exit 1
          fi
          if [ -z "$HF_SECRET_ACCESS_KEY" ]; then
            echo "ERROR: HF_SECRET_ACCESS_KEY secret not set"
            exit 1
          fi
          echo "✓ All secrets loaded successfully"
      
      - name: Build
        run: npm run build
      
      - name: Deploy to production
        run: npm run deploy
        # Server starts with HF credentials in environment
        # Dashboard requests via /api/credentials/load
